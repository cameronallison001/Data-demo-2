<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>META — Market States</title>

    <script src="https://cdn.jsdelivr.net/npm/p5@2.2.0/lib/p5.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="hud">
      <div class="title">META — Market States</div>
      <div class="hint">
        <span>1</span> Price
        <span>2</span> Candles
        <span>3</span> Volatility
        <span>4</span> Volume
        <span class="sep">•</span>
        Drag to scrub
        <span class="sep">•</span>
        Click once = sound
        <span class="sep">•</span>
        <span>Space</span> Auto-play
      </div>
    </div>

    <div id="controls">
      <button class="chip" id="chip1">1</button>
      <button class="chip" id="chip2">2</button>
      <button class="chip" id="chip3">3</button>
      <button class="chip" id="chip4">4</button>
      <button class="chip" id="chipPlay">▶</button>
      <button class="chip" id="chipSound">♪</button>
    </div>

    <script src="sketch.js"></script>
  </body>
</html>
